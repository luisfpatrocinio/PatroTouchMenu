; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = bodmer/TFT_eSPI@^2.5.43
monitor_speed = 115200

build_flags =
    ; Define que vamos usar configurações customizadas (ignora o User_Setup.h interno)
    -D USER_SETUP_LOADED=1
    
    ; Define o driver correto para o display JC2432S02
    -D ILI9341_DRIVER=1
    
    ; Configurações do Barramento SPI (Padrão VSPI do ESP32)
    -D TFT_MISO=19
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    
    ; Pinos de Controle do Display
    -D TFT_CS=5
    -D TFT_DC=2
    -D TFT_RST=4
    -D TFT_BL=15
    
    ; Pino de Controle do Touch (Ativa o chip XPT2046)
    -D TOUCH_CS=21
    
    ; Fontes que serão carregadas na memória flash
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    
    ; Velocidades do barramento SPI
    -D SPI_FREQUENCY=27000000
    -D SPI_TOUCH_FREQUENCY=2500000